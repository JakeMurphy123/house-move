<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>Our House Move</title>
<style>
  :root{
    --bg:#0F1923;
    --card:#1A2635;
    --card2:#1F2E40;
    --border:rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.12);
    --jake:#00C896;
    --jake-dim:rgba(0,200,150,0.15);
    --jake-glow:rgba(0,200,150,0.3);
    --issy:#FF4D8D;
    --issy-dim:rgba(255,77,141,0.15);
    --issy-glow:rgba(255,77,141,0.3);
    --text:#F0F4F8;
    --text2:#8899AA;
    --text3:#5A6B7A;
    --urgent:#FF5252;
    --urgent-dim:rgba(255,82,82,0.15);
    --high:#FFB74D;
    --high-dim:rgba(255,183,77,0.15);
    --radius:16px;
    --radius-sm:10px;
    --radius-xs:7px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ===== HEADER ===== */
  .header{
    position:relative;
    padding:56px 20px 0;
    overflow:hidden;
  }
  .header-bg{ position:absolute; inset:0; background:linear-gradient(135deg,#0F2A1E 0%,#0F1923 45%,#1A0F23 100%); z-index:0; }
  .header-glow-j{ position:absolute; top:-60px; left:-40px; width:260px; height:260px; background:radial-gradient(circle,rgba(0,200,150,0.18) 0%,transparent 70%); z-index:1; pointer-events:none; }
  .header-glow-i{ position:absolute; top:-40px; right:-60px; width:220px; height:220px; background:radial-gradient(circle,rgba(255,77,141,0.14) 0%,transparent 70%); z-index:1; pointer-events:none; }
  .header-content{ position:relative; z-index:2; }

  .header-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
  .header-title h1{ font-size:26px; font-weight:700; letter-spacing:-0.5px; color:#fff; line-height:1.15; }
  .header-title .tagline{ font-size:13px; color:rgba(255,255,255,0.45); margin-top:3px; }

  .live-pill{ display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:5px 10px; font-size:11px; color:rgba(255,255,255,0.55); backdrop-filter:blur(10px); }
  .live-pill .dot{ width:6px; height:6px; border-radius:50%; background:var(--jake); box-shadow:0 0 6px var(--jake); animation:livepulse 2s infinite; }
  .live-pill .dot.off{ background:#FF5252; box-shadow:0 0 6px #FF5252; animation:none; }
  @keyframes livepulse{ 0%,100%{opacity:1} 50%{opacity:0.5} }

  .header-stats{ display:flex; align-items:center; gap:16px; margin-bottom:24px; }

  .progress-ring-wrap{ flex-shrink:0; position:relative; width:72px; height:72px; }
  .progress-ring-wrap svg{ transform:rotate(-90deg); }
  .progress-ring-track{ fill:none; stroke:rgba(255,255,255,0.07); stroke-width:5; }
  .progress-ring-fill{ fill:none; stroke-width:5; stroke-linecap:round; stroke:url(#progressGrad); transition:stroke-dashoffset 0.6s ease; }
  .progress-pct{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .progress-pct .pnum{ font-size:17px; font-weight:700; color:#fff; line-height:1; }
  .progress-pct .plbl{ font-size:8.5px; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:0.04em; margin-top:1px; }

  .stats-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; flex:1; }
  .stat-box{ background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:var(--radius-xs); padding:9px 12px; }
  .stat-box .sn{ font-size:20px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }
  .stat-box .sl{ font-size:10px; color:var(--text2); margin-top:2px; }
  .stat-box.overdue .sn{ color:var(--urgent); }
  .stat-box.week .sn{ color:var(--high); }

  /* ===== NAV TABS (Tasks / Wishlist) ===== */
  .main-tabs{
    display:flex;
    margin:0 -20px;
    border-top:1px solid rgba(255,255,255,0.06);
    border-bottom:none;
  }
  .main-tab{
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:13px 8px 15px;
    font-size:13.5px; font-weight:600; color:var(--text2);
    cursor:pointer; position:relative;
    transition:color 0.2s; user-select:none;
  }
  .main-tab::after{ content:''; position:absolute; bottom:0; left:15%; right:15%; height:2.5px; border-radius:2px; background:transparent; transition:background 0.2s; }
  .main-tab.active{ color:#fff; }
  .main-tab.tasks.active::after{ background:var(--jake); }
  .main-tab.wishlist.active::after{ background:var(--issy); }

  /* Owner tabs (tasks only) */
  .owner-tabs{ display:flex; }
  .otab{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:12px 8px 14px; font-size:13px; font-weight:600; color:var(--text2); cursor:pointer; position:relative; transition:color 0.2s; user-select:none; }
  .otab::after{ content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px; border-radius:2px; background:transparent; transition:background 0.2s; }
  .otab.active{ color:#fff; }
  .otab[data-owner="jake"].active::after{ background:var(--jake); }
  .otab[data-owner="issy"].active::after{ background:var(--issy); }
  .otab[data-owner="all"].active::after{ background:rgba(255,255,255,0.5); }
  .oav{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .oav.jake{ background:var(--jake); color:#0A1A12; }
  .oav.issy{ background:var(--issy); color:#fff; }
  .oav.all{ background:rgba(255,255,255,0.12); color:var(--text); font-size:13px; }

  /* ===== SECTIONS ===== */
  .section{ display:none; padding-bottom:120px; }
  .section.active{ display:block; }

  main{ padding:20px 16px 0; max-width:640px; margin:0 auto; }

  .sec-head{ display:flex; align-items:center; gap:10px; margin:24px 0 10px; }
  .sec-head:first-child{ margin-top:0; }
  .sec-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text3); white-space:nowrap; }
  .sec-head.overdue .sec-label{ color:var(--urgent); }
  .sec-line{ flex:1; height:1px; background:var(--border); }
  .sec-head.overdue .sec-line{ background:rgba(255,82,82,0.25); }
  .sec-count{ font-size:11px; font-weight:600; color:var(--text3); font-variant-numeric:tabular-nums; }

  /* ===== TASK CARDS ===== */
  .card{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:9px; display:flex; align-items:stretch; overflow:hidden; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s; position:relative; }
  .card:active{ transform:scale(0.985); }
  .card.jake-card{ border-color:rgba(0,200,150,0.15); }
  .card.jake-card:hover{ border-color:rgba(0,200,150,0.28); box-shadow:0 0 20px rgba(0,200,150,0.08); }
  .card.issy-card{ border-color:rgba(255,77,141,0.15); }
  .card.issy-card:hover{ border-color:rgba(255,77,141,0.28); box-shadow:0 0 20px rgba(255,77,141,0.08); }
  .card.both-card:hover{ border-color:var(--border2); box-shadow:0 4px 20px rgba(0,0,0,0.2); }
  .card-glow{ position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }
  .card.jake-card .card-glow{ background:linear-gradient(180deg,var(--jake),rgba(0,200,150,0.4)); }
  .card.issy-card .card-glow{ background:linear-gradient(180deg,var(--issy),rgba(255,77,141,0.4)); }
  .card.both-card .card-glow{ background:linear-gradient(180deg,var(--jake),var(--issy)); }
  .card.done{ opacity:0.45; }
  .card.done .card-title{ text-decoration:line-through; color:var(--text2); }

  .card-check{ flex-shrink:0; width:52px; display:flex; align-items:center; justify-content:center; }
  .ccheck{ width:24px; height:24px; border-radius:50%; border:2px solid var(--border2); display:flex; align-items:center; justify-content:center; transition:all 0.2s; cursor:pointer; flex-shrink:0; }
  .ccheck.checked-jake{ background:var(--jake); border-color:var(--jake); box-shadow:0 0 10px var(--jake-glow); }
  .ccheck.checked-issy{ background:var(--issy); border-color:var(--issy); box-shadow:0 0 10px var(--issy-glow); }
  .ccheck.checked-both{ background:linear-gradient(135deg,var(--jake),var(--issy)); border-color:transparent; }
  .tick{ display:none; font-size:12px; color:#fff; font-weight:700; }
  .ccheck.checked-jake .tick,.ccheck.checked-issy .tick,.ccheck.checked-both .tick{ display:block; }

  .card-body{ flex:1; padding:14px 10px 14px 4px; min-width:0; }
  .card-title{ font-size:15px; font-weight:600; line-height:1.3; margin-bottom:7px; color:var(--text); }
  .card-chips{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }

  .chip{ font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px; letter-spacing:0.01em; }
  .chip.jake{ background:var(--jake-dim); color:var(--jake); }
  .chip.issy{ background:var(--issy-dim); color:var(--issy); }
  .chip.both{ background:linear-gradient(90deg,var(--jake-dim),var(--issy-dim)); color:var(--text2); }
  .chip.urgent{ background:var(--urgent-dim); color:var(--urgent); }
  .chip.high{ background:var(--high-dim); color:var(--high); }
  .chip.medium{ background:rgba(0,200,150,0.1); color:rgba(0,200,150,0.8); }
  .chip.low{ background:rgba(255,255,255,0.05); color:var(--text3); }

  .card-notes{ font-size:12.5px; color:var(--text2); margin-top:5px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-right{ flex-shrink:0; padding:14px 16px 14px 6px; display:flex; flex-direction:column; align-items:flex-end; justify-content:center; gap:3px; }
  .due-date{ font-size:12.5px; font-weight:700; white-space:nowrap; font-variant-numeric:tabular-nums; color:var(--text2); }
  .due-date.over{ color:var(--urgent); }
  .due-date.soon{ color:var(--high); }
  .due-date.today{ color:var(--jake); }
  .due-label{ font-size:10px; color:var(--text3); white-space:nowrap; }

  /* ===== WISHLIST ===== */
  .wishlist-add{
    display:flex;
    gap:8px;
    margin-bottom:20px;
    background:var(--card);
    border:1px solid var(--border2);
    border-radius:var(--radius);
    padding:12px;
    align-items:center;
  }

  .wishlist-add input{
    flex:1;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border2);
    border-radius:var(--radius-xs);
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    padding:10px 12px;
    -webkit-appearance:none;
  }
  .wishlist-add input:focus{ outline:none; border-color:var(--issy); box-shadow:0 0 0 3px var(--issy-glow); }
  .wishlist-add input::placeholder{ color:var(--text3); }

  .add-btn{
    flex-shrink:0;
    background:linear-gradient(135deg,var(--issy),#C0306A);
    color:#fff;
    border:none;
    border-radius:var(--radius-xs);
    padding:10px 16px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
    transition:opacity 0.15s,transform 0.1s;
    display:flex; align-items:center; gap:6px;
  }
  .add-btn:active{ transform:scale(0.96); opacity:0.85; }
  .add-btn:disabled{ opacity:0.5; pointer-events:none; }

  /* Item list */
  .items-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .item-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    align-items:stretch;
    cursor:pointer;
    transition:border-color 0.15s,box-shadow 0.15s;
    position:relative;
  }
  .item-card:hover{ border-color:rgba(255,77,141,0.3); box-shadow:0 0 20px rgba(255,77,141,0.08); }
  .item-card:active{ opacity:0.88; }

  .item-img-wrap{
    flex-shrink:0;
    width:90px; height:90px;
    position:relative;
    overflow:hidden;
  }

  .item-img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .item-img-placeholder{
    width:100%; height:100%;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:var(--text3);
  }

  .item-body{
    flex:1;
    padding:11px 12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:4px;
    min-width:0;
  }

  .item-title{
    font-size:13.5px;
    font-weight:600;
    color:var(--text);
    line-height:1.3;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .item-meta{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .item-price{
    font-size:14px;
    font-weight:700;
    color:var(--jake);
    font-variant-numeric:tabular-nums;
  }
  .item-price.no-price{
    font-size:11.5px;
    font-weight:500;
    color:var(--text3);
    text-decoration:underline;
    cursor:pointer;
  }

  .item-source{
    font-size:10.5px;
    color:var(--text3);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .item-right{
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:0 14px 0 6px;
    gap:8px;
  }

  .item-delete{
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(255,82,82,0.15);
    border:1px solid rgba(255,82,82,0.25);
    cursor:pointer;
    font-size:14px; color:var(--urgent);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    z-index:2;
  }
  .item-delete:active{ transform:scale(0.88); background:var(--urgent-dim); }

  /* Scraping state */
  .item-card.loading .item-img-placeholder{ animation:shimmer 1.4s infinite; }
  @keyframes shimmer{
    0%{ background:var(--card2); }
    50%{ background:#243548; }
    100%{ background:var(--card2); }
  }

  /* Empty wishlist */
  .wishlist-empty{
    text-align:center;
    padding:40px 20px;
    color:var(--text2);
  }
  .wishlist-empty .emoji{ font-size:38px; display:block; margin-bottom:10px; }
  .wishlist-empty p{ font-size:13.5px; line-height:1.5; }

  /* ===== FAB ===== */
  .fab{ position:fixed; bottom:28px; right:20px; width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,var(--jake),#00A878); color:#0A1A12; font-size:28px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,200,150,0.4),0 2px 8px rgba(0,0,0,0.3); z-index:40; transition:transform 0.15s,box-shadow 0.15s; font-weight:300; line-height:1; }
  .fab.issy-fab{ background:linear-gradient(135deg,var(--issy),#C0306A); box-shadow:0 4px 20px rgba(255,77,141,0.4),0 2px 8px rgba(0,0,0,0.3); }
  .fab:hover{ transform:scale(1.07); }
  .fab:active{ transform:scale(0.94); }

  /* Completed */
  .completed-toggle{ display:flex; align-items:center; gap:8px; padding:14px 0 6px; cursor:pointer; background:none; border:none; font-family:inherit; width:100%; color:var(--text2); }
  .completed-toggle:hover{ color:var(--text); }
  .ct-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; }
  .ct-line{ flex:1; height:1px; background:var(--border); }
  .ct-count{ font-size:11px; font-weight:600; background:rgba(255,255,255,0.06); padding:2px 8px; border-radius:10px; }
  .ct-chev{ font-size:10px; color:var(--text3); }

  /* Empty */
  .empty{ text-align:center; padding:50px 20px; color:var(--text2); }
  .empty .emoji{ font-size:40px; display:block; margin-bottom:12px; }
  .empty p{ font-size:14px; line-height:1.5; }

  /* Loading */
  .loading{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:70px 20px; gap:14px; color:var(--text2); font-size:14px; }
  .spinner{ width:32px; height:32px; border:2.5px solid var(--border2); border-top-color:var(--jake); border-radius:50%; animation:spin 0.75s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== MODAL ===== */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); display:none; align-items:flex-end; justify-content:center; z-index:100; }
  .modal-overlay.show{ display:flex; }
  .modal{ background:var(--card2); border:1px solid var(--border2); border-radius:24px 24px 0 0; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom,24px); box-shadow:0 -20px 60px rgba(0,0,0,0.5); }
  .modal-handle{ width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:14px auto 0; }
  .modal-head{ padding:16px 20px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .modal-head h3{ font-size:17px; font-weight:700; }
  .modal-close{ width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.08); border:none; cursor:pointer; font-size:16px; color:var(--text2); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover{ background:rgba(255,255,255,0.14); color:var(--text); }
  .modal-body{ padding:20px; display:flex; flex-direction:column; gap:18px; }

  .field label{ display:block; font-size:11.5px; font-weight:700; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.04em; }
  .field input[type=text],.field input[type=date],.field textarea{ width:100%; font-family:inherit; font-size:15px; padding:13px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); -webkit-appearance:none; transition:border-color 0.15s,box-shadow 0.15s; }
  .field input:focus,.field textarea:focus{ outline:none; border-color:var(--jake); box-shadow:0 0 0 3px var(--jake-glow); }
  .field textarea{ resize:none; min-height:76px; line-height:1.45; }
  .field input::placeholder,.field textarea::placeholder{ color:var(--text3); }

  .owner-pick{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .opick{ padding:12px 8px 10px; border:1.5px solid var(--border2); border-radius:var(--radius-sm); cursor:pointer; text-align:center; font-size:12.5px; font-weight:600; color:var(--text2); transition:all 0.15s; display:flex; flex-direction:column; align-items:center; gap:7px; background:rgba(255,255,255,0.03); }
  .opick-av{ width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; }
  .opick.jake .opick-av{ background:var(--jake-dim); color:var(--jake); }
  .opick.issy .opick-av{ background:var(--issy-dim); color:var(--issy); }
  .opick.both .opick-av{ background:linear-gradient(135deg,var(--jake-dim),var(--issy-dim)); font-size:18px; }
  .opick.sel-jake{ border-color:var(--jake); background:var(--jake-dim); color:var(--jake); }
  .opick.sel-issy{ border-color:var(--issy); background:var(--issy-dim); color:var(--issy); }
  .opick.sel-both{ border-color:var(--border2); background:rgba(255,255,255,0.06); color:var(--text); }

  .priority-pick{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .ppick{ padding:10px 4px; border:1.5px solid var(--border2); border-radius:var(--radius-xs); cursor:pointer; text-align:center; font-size:11.5px; font-weight:600; color:var(--text2); background:rgba(255,255,255,0.03); transition:all 0.15s; }
  .ppick.sel-urgent{ border-color:var(--urgent); background:var(--urgent-dim); color:var(--urgent); }
  .ppick.sel-high{ border-color:var(--high); background:var(--high-dim); color:var(--high); }
  .ppick.sel-medium{ border-color:var(--jake); background:var(--jake-dim); color:var(--jake); }
  .ppick.sel-low{ border-color:var(--border2); background:rgba(255,255,255,0.06); color:var(--text2); }

  .modal-foot{ padding:12px 20px 20px; display:flex; gap:8px; border-top:1px solid var(--border); position:sticky; bottom:0; background:var(--card2); }
  .btn{ font-family:inherit; font-size:15px; font-weight:700; border:none; padding:15px 20px; border-radius:var(--radius-sm); cursor:pointer; flex:1; transition:opacity 0.15s,transform 0.1s; }
  .btn:active{ opacity:0.8; transform:scale(0.98); }
  .btn.primary{ background:linear-gradient(135deg,var(--jake),#00A878); color:#0A1A12; }
  .btn.secondary{ background:rgba(255,255,255,0.08); color:var(--text); }
  .btn.danger{ background:var(--urgent-dim); color:var(--urgent); flex:0; padding:15px 16px; }

  /* Toast */
  .toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--card2); border:1px solid var(--border2); color:var(--text); padding:11px 20px; border-radius:24px; font-size:13.5px; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0; transition:all 0.25s; pointer-events:none; z-index:200; white-space:nowrap; backdrop-filter:blur(10px); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion:reduce){ *{ transition:none !important; animation:none !important; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-bg"></div>
  <div class="header-glow-j"></div>
  <div class="header-glow-i"></div>
  <div class="header-content">
    <div class="header-top">
      <div class="header-title">
        <h1>🏠 Our House Move</h1>
        <div class="tagline" id="headerDate">—</div>
      </div>
      <div class="live-pill">
        <span class="dot" id="liveDot"></span>
        <span id="liveText">Live</span>
      </div>
    </div>

    <div class="header-stats">
      <div class="progress-ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <defs>
            <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00C896"/>
              <stop offset="100%" stop-color="#FF4D8D"/>
            </linearGradient>
          </defs>
          <circle class="progress-ring-track" cx="36" cy="36" r="30"/>
          <circle class="progress-ring-fill" id="progressRing" cx="36" cy="36" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        </svg>
        <div class="progress-pct">
          <span class="pnum" id="progressPct">0%</span>
          <span class="plbl">Done</span>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box overdue"><div class="sn" id="stat-overdue">0</div><div class="sl">Overdue</div></div>
        <div class="stat-box week"><div class="sn" id="stat-week">0</div><div class="sl">This week</div></div>
        <div class="stat-box"><div class="sn" id="stat-open">0</div><div class="sl">Open</div></div>
        <div class="stat-box"><div class="sn" id="stat-done">0</div><div class="sl">Done</div></div>
      </div>
    </div>

    <!-- Main tab switcher -->
    <div class="main-tabs">
      <div class="main-tab tasks active" data-tab="tasks">✓ Tasks</div>
      <div class="main-tab wishlist" data-tab="wishlist">🛋 Wishlist</div>
    </div>
  </div>
</div>

<!-- TASKS SECTION -->
<div class="section active" id="section-tasks">
  <div style="background:rgba(255,255,255,0.03); border-bottom:1px solid var(--border);">
    <div style="max-width:640px; margin:0 auto;">
      <div class="owner-tabs">
        <div class="otab active" data-owner="all"><span class="oav all">☰</span> All</div>
        <div class="otab" data-owner="jake"><span class="oav jake">J</span> Jake</div>
        <div class="otab" data-owner="issy"><span class="oav issy">I</span> Issy</div>
      </div>
    </div>
  </div>
  <main id="tasksMain">
    <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
  </main>
</div>

<!-- WISHLIST SECTION -->
<div class="section" id="section-wishlist">
  <main>
    <div class="wishlist-add">
      <input type="url" id="wishUrl" placeholder="Paste a product URL…" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="add-btn" id="wishAddBtn">
        <span id="wishBtnText">Add</span>
      </button>
    </div>
    <div id="itemsContainer">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </main>
</div>

<button class="fab" id="fabBtn">+</button>

<!-- Task Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h3 id="modalTitle">New Task</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Task</label><input type="text" id="f-title" placeholder="e.g. Book removal company" autocomplete="off"></div>
      <div class="field"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Any extra details…"></textarea></div>
      <div class="field">
        <label>Whose action</label>
        <div class="owner-pick">
          <div class="opick jake" data-o="jake"><span class="opick-av">J</span>Jake</div>
          <div class="opick issy" data-o="issy"><span class="opick-av">I</span>Issy</div>
          <div class="opick both" data-o="both"><span class="opick-av">✦</span>Both</div>
        </div>
      </div>
      <div class="field">
        <label>Priority</label>
        <div class="priority-pick">
          <div class="ppick" data-p="urgent">Urgent</div>
          <div class="ppick" data-p="high">High</div>
          <div class="ppick" data-p="medium">Medium</div>
          <div class="ppick" data-p="low">Low</div>
        </div>
      </div>
      <div class="field"><label>Due date</label><input type="date" id="f-due"></div>
    </div>
    <div class="modal-foot">
      <button class="btn danger" id="deleteBtn" style="display:none">🗑</button>
      <button class="btn secondary" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const SUPABASE_URL = 'https://gvwrueelxnvlqyxtxfth.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2d3J1ZWVseG52bHF5eHR4ZnRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjQ5NDAsImV4cCI6MjA5ODQ0MDk0MH0.I760BEa784ao8OIHfm-0diiJz8DtP9O3Incdyha2o68';
  const H = { 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' };
  const TASKS_API = `${SUPABASE_URL}/rest/v1/house_tasks`;
  const ITEMS_API = `${SUPABASE_URL}/rest/v1/house_items`;
  const SCRAPE_FN = `${SUPABASE_URL}/functions/v1/scrape-item`;

  let tasks=[], items=[], ownerFilter='all', editingId=null, selOwner='jake', selPriority='medium', completedExpanded=false, currentTab='tasks';

  // ===== API =====
  async function fetchTasks(){
    try{ const r=await fetch(`${TASKS_API}?order=due_date.asc.nullslast,created_at.asc`,{headers:H}); tasks=await r.json(); renderTasks(); setLive(true); }
    catch(e){ setLive(false); }
  }

  async function fetchItems(){
    try{ const r=await fetch(`${ITEMS_API}?order=created_at.desc`,{headers:H}); items=await r.json(); renderItems(); }
    catch(e){ document.getElementById('itemsContainer').innerHTML=`<div class="wishlist-empty"><span class="emoji">⚠️</span><p>Couldn't load wishlist.</p></div>`; }
  }

  async function upsertTask(t){
    const method=t.id?'PATCH':'POST', url=t.id?`${TASKS_API}?id=eq.${t.id}`:TASKS_API;
    const b={...t}; if(t.id) delete b.id; b.updated_at=new Date().toISOString();
    try{ const r=await fetch(url,{method,headers:H,body:JSON.stringify(b)}); if(!r.ok) throw new Error(); return true; }
    catch(e){ showToast('Save failed'); return false; }
  }

  async function deleteTask(id){
    try{ await fetch(`${TASKS_API}?id=eq.${id}`,{method:'DELETE',headers:H}); return true; }
    catch(e){ showToast('Delete failed'); return false; }
  }

  async function deleteItem(id){
    try{ await fetch(`${ITEMS_API}?id=eq.${id}`,{method:'DELETE',headers:H}); return true; }
    catch(e){ showToast('Delete failed'); return false; }
  }

  async function toggleDone(id,done){
    try{ await fetch(`${TASKS_API}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({done,done_at:done?new Date().toISOString():null,updated_at:new Date().toISOString()})}); }
    catch(e){}
  }

  async function scrapeAndSave(url){
    let title=null, image=null, price=null;

    // Call edge function with correct headers (no Prefer header - that's for REST API only)
    const edgeHeaders = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    };

    try{
      const r = await fetch(SCRAPE_FN, {
        method: 'POST',
        headers: edgeHeaders,
        body: JSON.stringify({url})
      });
      if(r.ok){
        const d = await r.json();
        title = d.title || null;
        image = d.image || null;
        price = d.price || null;
      }
    }catch(e){ console.error('Scrape failed:', e); }

    if(!title){ try{ title = new URL(url).hostname.replace('www.',''); }catch(e){ title = url; } }

    const item = { url, title, image:image||null, price:price||null, notes:null };
    try{
      const r = await fetch(ITEMS_API, {method:'POST', headers:H, body:JSON.stringify(item)});
      if(!r.ok) throw new Error(await r.text());
      // Fetch fresh list without waiting for realtime (which can be slow/unreliable)
      await fetchItems();
      showToast('✓ Item added');
    }catch(e){
      console.error('Save failed:', e);
      showToast('Failed to save item');
    }
  }

  // ===== Realtime =====
  function connectRealtime(){
    try{
      const ws=new WebSocket(`${SUPABASE_URL.replace('https','wss')}/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`);
      ws.onopen=()=>{ setLive(true);
        ['house_tasks','house_items'].forEach((t,i)=>ws.send(JSON.stringify({topic:`realtime:public:${t}`,event:'phx_join',payload:{config:{broadcast:{self:false},presence:{},postgres_changes:[{event:'*',schema:'public',table:t}]}},ref:String(i+1)})));
      };
      ws.onmessage=e=>{
        const m=JSON.parse(e.data);
        if(m.event==='postgres_changes'||(m.payload&&m.payload.data)){
          const tbl=m.payload?.data?.table||m.topic||'';
          if(tbl.includes('house_tasks')) fetchTasks();
          else if(tbl.includes('house_items')) fetchItems();
          else { fetchTasks(); fetchItems(); }
        }
      };
      ws.onerror=()=>setLive(false);
      ws.onclose=()=>{ setLive(false); setTimeout(connectRealtime,5000); };
    }catch(e){ setLive(false); }
  }

  function setLive(on){
    const d=document.getElementById('liveDot'),t=document.getElementById('liveText');
    if(d) d.className='dot'+(on?'':' off');
    if(t) t.textContent=on?'Live':'Offline';
  }

  const todayStr=()=>new Date().toISOString().slice(0,10);
  function daysUntil(ds){ if(!ds) return null; return Math.round((new Date(ds+'T00:00:00')-new Date(todayStr()+'T00:00:00'))/86400000); }
  function fmtDate(ds){ if(!ds) return ''; return new Date(ds+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
  function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
  function pRank(p){ return {urgent:0,high:1,medium:2,low:3}[p]??4; }

  // ===== RENDER TASKS =====
  function renderTasks(){
    const main=document.getElementById('tasksMain');
    main.innerHTML='';

    const all=tasks, done=all.filter(t=>t.done), open=all.filter(t=>!t.done);
    let overdue=0,week=0;
    open.forEach(t=>{ const d=daysUntil(t.due_date); if(d!==null&&d<0) overdue++; else if(d!==null&&d<=7) week++; });
    document.getElementById('stat-overdue').textContent=overdue;
    document.getElementById('stat-week').textContent=week;
    document.getElementById('stat-open').textContent=open.length;
    document.getElementById('stat-done').textContent=done.length;

    const pct=all.length?Math.round(done.length/all.length*100):0;
    document.getElementById('progressPct').textContent=pct+'%';
    const offset=188.5-(pct/100*188.5);
    document.getElementById('progressRing').style.strokeDashoffset=offset;

    let list=tasks.slice();
    if(ownerFilter==='jake') list=list.filter(t=>t.owner==='jake'||t.owner==='both');
    if(ownerFilter==='issy') list=list.filter(t=>t.owner==='issy'||t.owner==='both');

    const active=list.filter(t=>!t.done), completed=list.filter(t=>t.done);

    if(active.length===0&&completed.length===0){
      main.innerHTML=`<div class="empty"><span class="emoji">✨</span><p>No tasks yet.<br>Tap + to add your first one.</p></div>`;
      return;
    }

    const grpOverdue=active.filter(t=>t.due_date&&daysUntil(t.due_date)<0).sort((a,b)=>a.due_date.localeCompare(b.due_date));
    const grpWeek=active.filter(t=>{ if(!t.due_date) return false; const d=daysUntil(t.due_date); return d>=0&&d<=7; }).sort((a,b)=>a.due_date.localeCompare(b.due_date)||pRank(a.priority)-pRank(b.priority));
    const grpLater=active.filter(t=>t.due_date&&daysUntil(t.due_date)>7).sort((a,b)=>a.due_date.localeCompare(b.due_date)||pRank(a.priority)-pRank(b.priority));
    const grpNone=active.filter(t=>!t.due_date).sort((a,b)=>pRank(a.priority)-pRank(b.priority));

    function addSec(label,items,isOverdue){
      if(!items.length) return;
      const h=document.createElement('div');
      h.className='sec-head'+(isOverdue?' overdue':'');
      h.innerHTML=`<span class="sec-label">${label}</span><span class="sec-line"></span><span class="sec-count">${items.length}</span>`;
      main.appendChild(h);
      items.forEach(t=>main.appendChild(makeTaskCard(t)));
    }

    addSec('Overdue',grpOverdue,true);
    addSec('This week',grpWeek,false);
    addSec('Coming up',grpLater,false);
    addSec('No due date',grpNone,false);

    if(active.length===0){ const e=document.createElement('div'); e.className='empty'; e.innerHTML=`<span class="emoji">🎉</span><p>All caught up!</p>`; main.appendChild(e); }

    if(completed.length){
      const wrap=document.createElement('div');
      const btn=document.createElement('button');
      btn.className='completed-toggle';
      btn.innerHTML=`<span class="ct-label">Completed</span><span class="ct-line"></span><span class="ct-count">${completed.length}</span><span class="ct-chev">${completedExpanded?'▲':'▼'}</span>`;
      btn.addEventListener('click',()=>{ completedExpanded=!completedExpanded; renderTasks(); });
      wrap.appendChild(btn);
      if(completedExpanded){
        const sorted=completed.slice().sort((a,b)=>(b.done_at||'').localeCompare(a.done_at||''));
        sorted.forEach(t=>wrap.appendChild(makeTaskCard(t)));
      }
      main.appendChild(wrap);
    }
  }

  function makeTaskCard(t){
    const card=document.createElement('div');
    card.className=`card ${t.owner}-card${t.done?' done':''}`;
    const dd=daysUntil(t.due_date);
    let dueClass='',dueLabel='';
    if(t.done){ dueLabel='Done'; }
    else if(dd===null){ dueLabel=''; }
    else if(dd<0){ dueClass='over'; dueLabel=Math.abs(dd)+'d late'; }
    else if(dd===0){ dueClass='today'; dueLabel='Today'; }
    else if(dd===1){ dueLabel='Tomorrow'; }
    else if(dd<=3){ dueClass='soon'; dueLabel='In '+dd+'d'; }
    else{ dueLabel='In '+dd+'d'; }
    const ownerLabel=t.owner==='jake'?'Jake':t.owner==='issy'?'Issy':'Both';
    const checkClass=t.done?`checked-${t.owner}`:'';
    card.innerHTML=`
      <div class="card-glow"></div>
      <div class="card-check"><div class="ccheck ${checkClass}" data-check="${t.id}"><span class="tick">✓</span></div></div>
      <div class="card-body" data-edit="${t.id}">
        <div class="card-title">${esc(t.title)}</div>
        ${t.notes?`<div class="card-notes">${esc(t.notes)}</div>`:''}
        <div class="card-chips"><span class="chip ${t.owner}">${ownerLabel}</span><span class="chip ${t.priority}">${t.priority}</span></div>
      </div>
      <div class="card-right" data-edit="${t.id}">
        ${t.due_date?`<div class="due-date ${dueClass}">${fmtDate(t.due_date)}</div><div class="due-label">${dueLabel}</div>`:''}
      </div>`;
    return card;
  }

  // ===== RENDER ITEMS =====
  function renderItems(){
    const container=document.getElementById('itemsContainer');
    container.innerHTML='';
    if(!items.length){
      container.innerHTML=`<div class="wishlist-empty"><span class="emoji">🛋️</span><p>No items yet.<br>Paste a product link above to add furniture,<br>appliances or anything you like.</p></div>`;
      return;
    }
    let total=0, counted=0;
    items.forEach(it=>{ const n=parseFloat((it.price||'').replace(/[^0-9.]/g,'')); if(!isNaN(n)&&n>0){ total+=n; counted++; } });
    const bar=document.createElement('div');
    bar.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:2px 2px 14px;';
    bar.innerHTML=`<span style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;font-weight:700;">${items.length} item${items.length!==1?'s':''}</span>${counted>0?`<span style="font-size:15px;font-weight:700;color:var(--jake);">Total: £${total.toFixed(2)}</span>`:''}`;
    container.appendChild(bar);
    const list=document.createElement('div');
    list.className='items-list';
    items.forEach(it=>list.appendChild(makeItemCard(it)));
    container.appendChild(list);
  }

  function makeItemCard(it){
    const card=document.createElement('div');
    card.className='item-card';
    let hostname='';
    try{ hostname=new URL(it.url).hostname.replace('www.',''); }catch(e){}

    const imgSection=it.image
      ?`<div class="item-img-wrap"><img class="item-img" src="${esc(it.image)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\'item-img-placeholder\'>🛋️</div>'"></div>`
      :`<div class="item-img-wrap"><div class="item-img-placeholder">🛋️</div></div>`;

    const priceHtml=it.price
      ?`<span class="item-price">${esc(it.price)}</span>`
      :`<span class="item-price no-price" data-edit-price="${it.id}">+ Add price</span>`;

    card.innerHTML=`
      ${imgSection}
      <div class="item-body">
        <div class="item-title">${esc(it.title||hostname)}</div>
        <div class="item-meta">${priceHtml}<span class="item-source">${esc(hostname)}</span></div>
      </div>
      <div class="item-right">
        <button class="item-delete" data-del="${it.id}">✕</button>
      </div>`;

    card.querySelector('.item-body').addEventListener('click', e=>{
      if(e.target.closest('[data-edit-price]')) return;
      window.open(it.url,'_blank','noopener');
    });
    card.querySelector('.item-img-wrap').addEventListener('click', ()=>window.open(it.url,'_blank','noopener'));

    const priceEl=card.querySelector('[data-edit-price]');
    if(priceEl){
      priceEl.addEventListener('click', async e=>{
        e.stopPropagation();
        const val=prompt('Enter the price (e.g. 299.99):');
        if(!val||!val.trim()) return;
        const raw=val.trim().replace(/[^0-9.]/g,'');
        const cleaned='£'+parseFloat(raw).toFixed(2);
        try{
          await fetch(`${ITEMS_API}?id=eq.${it.id}`,{method:'PATCH',headers:H,body:JSON.stringify({price:cleaned})});
          it.price=cleaned; renderItems(); showToast('Price saved');
        }catch(e){ showToast('Could not save price'); }
      });
    }

    card.querySelector('[data-del]').addEventListener('click', async e=>{
      e.stopPropagation();
      if(!confirm('Remove this item?')) return;
      const ok=await deleteItem(it.id);
      if(ok){ items=items.filter(x=>x.id!==it.id); renderItems(); showToast('Removed'); }
    });

    return card;
  }

  // ===== EVENT HANDLERS =====
  document.getElementById('tasksMain').addEventListener('click',async e=>{
    const chk=e.target.closest('[data-check]'), edt=e.target.closest('[data-edit]');
    if(chk){
      e.stopPropagation();
      const id=chk.getAttribute('data-check'), t=tasks.find(x=>x.id===id); if(!t) return;
      t.done=!t.done; t.done_at=t.done?new Date().toISOString():null;
      renderTasks(); await toggleDone(id,t.done);
      showToast(t.done?'✓ Done!':'Reopened');
    } else if(edt){ openModal(tasks.find(x=>x.id===edt.getAttribute('data-edit'))); }
  });

  // Wishlist add
  document.getElementById('wishAddBtn').addEventListener('click',async()=>{
    const input=document.getElementById('wishUrl');
    const url=input.value.trim();
    if(!url){ showToast('Paste a URL first'); return; }
    let parsed;
    try{ parsed=new URL(url); }catch(e){ showToast('That doesn\'t look like a valid URL'); return; }

    const btn=document.getElementById('wishAddBtn');
    const txt=document.getElementById('wishBtnText');
    btn.disabled=true; txt.textContent='Adding…';

    // Optimistic card while scraping
    const tempId='temp_'+Date.now();
    items.unshift({id:tempId,url,title:parsed.hostname.replace('www.',''),image:null,price:null});
    renderItems();
    input.value='';

    await scrapeAndSave(url);
    items=items.filter(x=>x.id!==tempId);
    btn.disabled=false; txt.textContent='Add';
  });

  document.getElementById('wishUrl').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('wishAddBtn').click(); });

  // Main tabs
  document.querySelectorAll('.main-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentTab=tab.getAttribute('data-tab');
      document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
      document.getElementById('section-'+currentTab).classList.add('active');
      const fab=document.getElementById('fabBtn');
      if(currentTab==='wishlist'){ fab.classList.add('issy-fab'); fab.style.display='none'; }
      else{ fab.classList.remove('issy-fab'); fab.style.display='flex'; }
    });
  });

  // Owner tabs
  document.querySelectorAll('.otab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.otab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      ownerFilter=tab.getAttribute('data-owner');
      renderTasks();
    });
  });

  // Modal
  const overlay=document.getElementById('modalOverlay');

  function openModal(task){
    editingId=task?task.id:null;
    document.getElementById('modalTitle').textContent=task?'Edit Task':'New Task';
    document.getElementById('f-title').value=task?task.title:'';
    document.getElementById('f-notes').value=task?task.notes||'':'';
    document.getElementById('f-due').value=task?task.due_date||'':'';
    selOwner=task?task.owner:'jake'; selPriority=task?task.priority:'medium';
    updateOwnerUI(); updatePriorityUI();
    document.getElementById('deleteBtn').style.display=task?'block':'none';
    overlay.classList.add('show');
    setTimeout(()=>document.getElementById('f-title').focus(),120);
  }

  function closeModal(){ overlay.classList.remove('show'); editingId=null; }

  function updateOwnerUI(){
    document.querySelectorAll('.opick').forEach(el=>{ const o=el.getAttribute('data-o'); el.className=`opick ${o}`+(o===selOwner?` sel-${o}`:''); });
  }
  function updatePriorityUI(){
    document.querySelectorAll('.ppick').forEach(el=>{ const p=el.getAttribute('data-p'); el.className='ppick'+(p===selPriority?` sel-${p}`:''); });
  }

  document.querySelectorAll('.opick').forEach(el=>el.addEventListener('click',()=>{ selOwner=el.getAttribute('data-o'); updateOwnerUI(); }));
  document.querySelectorAll('.ppick').forEach(el=>el.addEventListener('click',()=>{ selPriority=el.getAttribute('data-p'); updatePriorityUI(); }));

  document.getElementById('fabBtn').addEventListener('click',()=>openModal(null));
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('cancelBtn').addEventListener('click',closeModal);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });

  document.getElementById('saveBtn').addEventListener('click',async()=>{
    const title=document.getElementById('f-title').value.trim();
    if(!title){ showToast('Add a task name first'); return; }
    const task={ title, notes:document.getElementById('f-notes').value.trim()||null, owner:selOwner, priority:selPriority, due_date:document.getElementById('f-due').value||null, done:false };
    if(editingId){ task.id=editingId; const ex=tasks.find(t=>t.id===editingId); if(ex) task.done=ex.done; }
    const ok=await upsertTask(task);
    if(ok){ closeModal(); showToast(editingId?'✓ Updated':'✓ Task added'); await fetchTasks(); }
  });

  document.getElementById('deleteBtn').addEventListener('click',async()=>{
    if(!editingId||!confirm('Delete this task?')) return;
    const ok=await deleteTask(editingId);
    if(ok){ closeModal(); showToast('Deleted'); await fetchTasks(); }
  });

  // Init
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  fetchTasks();
  fetchItems();
  connectRealtime();
})();
</script>
</body>
</html>
